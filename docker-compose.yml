version: '3.8'

# ============================================
# TWT Partner Dashboard - Portainer Stack
# Using GitHub Container Registry (GHCR)
# ============================================
#
# Questo compose usa GHCR invece di Docker Hub
# Nessun account Docker Hub necessario!
#
# Setup in Portainer:
# 1. Stacks → Add stack
# 2. Build method: Repository
# 3. Repository URL: https://github.com/<your-username>/PARTNER-DASHBOARD
# 4. Repository reference: refs/heads/main
# 5. Compose path: docker-compose.ghcr.yml
# 6. Environment variables: Configurare nella UI
#
# IMPORTANTE: Le immagini devono essere pubbliche su GitHub!
# Vai su: https://github.com/<username>?tab=packages
# Click su package → Package settings → Change visibility → Public
# ============================================

services:
  # ==========================================
  # Backend Service (NestJS API)
  # ==========================================
  backend:
    # Immagine da GitHub Container Registry
    # Formato: ghcr.io/<github-username>/backend:latest
    image: ghcr.io/${GITHUB_USERNAME}/backend:latest
    container_name: backend
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]

    environment:
      # Application
      NODE_ENV: production
      PORT: 3000

      # CORS - URL pubblico del frontend
      CORS_ORIGIN: ${CORS_ORIGIN}

      # TWT API Configuration
      TWT_API_BASE_URL: https://reseller.twt.it/api/xdsl
      TWT_API_USERNAME: ${TWT_API_USERNAME}
      TWT_API_PASSWORD: ${TWT_API_PASSWORD}
      TWT_API_TIMEOUT: ${TWT_API_TIMEOUT:-30000}
      TWT_API_MAX_RETRIES: ${TWT_API_MAX_RETRIES:-3}

      # Rate Limiting
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}

      # Provider Filters
      TWT_PROVIDER_FILTER: ${TWT_PROVIDER_FILTER:-10}
      TWT_TECHNOLOGY_FILTER: ${TWT_TECHNOLOGY_FILTER:-FTTC,FTTH}
      TWT_INCLUDE_VARIANTS: ${TWT_INCLUDE_VARIANTS:-}
      TWT_EXCLUDE_VARIANTS: ${TWT_EXCLUDE_VARIANTS:-Lite}

      # Profile Filters
      EXCLUDE_PROFILES_WITH_PRIORITY: ${EXCLUDE_PROFILES_WITH_PRIORITY:-9999}
      PROFILE_DESCRIPTION_PREFIX: ${PROFILE_DESCRIPTION_PREFIX:-TWT_TI}
      EXCLUDE_PROFILES_BY_KEYWORD: ${EXCLUDE_PROFILES_BY_KEYWORD:-}
      PROFILE_TABLE_COLUMNS: ${PROFILE_TABLE_COLUMNS:-description}

    volumes:
      - backend-logs:/app/logs

    networks:
      - twt-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`green.partners.ws-services.eu`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"

  # ==========================================
  # Frontend Service (React + Nginx)
  # ==========================================
  frontend:
    # Immagine da GitHub Container Registry
    # Formato: ghcr.io/<github-username>/frontend:latest
    image: ghcr.io/${GITHUB_USERNAME}/frontend:latest
    container_name: frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - twt-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`green.partners.ws-services.eu`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ==========================================
  # Watchtower Service
  # ==========================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 200
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ==========================================
  # Traefik Service (Reverse Proxy)
  # ==========================================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./acme.json:/acme.json
    networks:
      - twt-network
    labels:
      - "com.centurylinklabs.watchtower.enable=false" # Non vogliamo che Traefik si aggiorni da solo

# ==========================================
# Networks
# ==========================================
networks:
  twt-network:
    name: network
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  backend-logs:
    name: backend-logs
    driver: local
