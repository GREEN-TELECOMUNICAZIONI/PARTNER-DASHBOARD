version: '3.8'

# ============================================
# TWT Partner Dashboard - Docker Compose
# ============================================

services:
  # ==========================================
  # Backend Service (NestJS)
  # ==========================================
  backend:
    container_name: twt-partner-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: twt-partner-backend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Application
      NODE_ENV: production
      PORT: 3000

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}

      # API Configuration
      TWT_API_BASE_URL: ${TWT_API_BASE_URL}
      TWT_API_KEY: ${TWT_API_KEY}
      TWT_API_TIMEOUT: ${TWT_API_TIMEOUT:-30000}
      TWT_API_MAX_RETRIES: ${TWT_API_MAX_RETRIES:-3}

      # Rate Limiting
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    volumes:
      # Logs volume
      - backend-logs:/app/logs
    networks:
      - twt-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Frontend Service (React + Nginx)
  # ==========================================
  frontend:
    container_name: twt-partner-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API URL for frontend - use backend service name for container-to-container communication
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    image: twt-partner-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - twt-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# Networks
# ==========================================
networks:
  twt-network:
    name: twt-partner-network
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  backend-logs:
    name: twt-partner-backend-logs
    driver: local
