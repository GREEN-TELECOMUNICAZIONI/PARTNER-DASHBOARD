version: '3.8'

# ============================================
# TWT Partner Dashboard - Portainer Stack
# Using GitHub Container Registry (GHCR)
# ============================================

services:
  # ==========================================
  # Backend Service (NestJS API)
  # ==========================================
  backend:
    image: ghcr.io/${GITHUB_USERNAME}/backend:latest
    container_name: backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      TWT_API_BASE_URL: https://reseller.twt.it/api/xdsl
      TWT_API_USERNAME: ${TWT_API_USERNAME}
      TWT_API_PASSWORD: ${TWT_API_PASSWORD}
    volumes:
      - backend-logs:/app/logs
    networks:
      - twt-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/coverage/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ==========================================
  # Frontend Service (React + Nginx)
  # ==========================================
  frontend:
    image: ghcr.io/${GITHUB_USERNAME}/frontend:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      # Esponiamo la porta al solo host, non pubblicamente.
      # Nginx si connetterà a localhost:8080
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - twt-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ==========================================
  # Watchtower Service
  # ==========================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 200
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

# ==========================================
# Networks
# ==========================================
networks:
  twt-network:
    name: network
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  backend-logs:
    name: backend-logs
    driver: local
