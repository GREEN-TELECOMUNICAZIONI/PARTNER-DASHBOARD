name: Build and Push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/backend:latest ./backend
          docker push ${{ env.IMAGE_PREFIX }}/backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/frontend:latest \
            --build-arg VITE_API_URL=http://green.partners.ws-services.eu/api \
            ./frontend
          docker push ${{ env.IMAGE_PREFIX }}/frontend:latest

      - name: Success
        run: echo "✅ Images pushed successfully!"
